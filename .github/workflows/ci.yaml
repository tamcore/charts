name: ci-tests

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Setup Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6

    - name: pre-commit
      uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1

  get-k8s-versions:
    runs-on: ubuntu-24.04

    outputs:
      versions: ${{ steps.get-k8s-versions.outputs.versions }}

    steps:
      - uses: imjasonh/setup-crane@6da1ae018866400525525ce74ff892880c099987 # v0.5

      - name: Determine latest kind versions
        id: get-k8s-versions
        shell: bash
        run: |
          set -x
          KIND_VERSIONS=$(crane ls kindest/node | sort -n | grep ^v)
          versions=$(for kind_minor in $(echo "$KIND_VERSIONS" | cut -d '.' -f2 | sort | uniq | tail -3)
          do
            echo "$KIND_VERSIONS" | grep "v1.${kind_minor}" | tail -1
          done | tr '\n' ',' | sed 's/,$//')
          json_output=$( jq -c -n --arg versions "$versions" '$versions | split(",")' )
          echo "versions=${json_output}" >> $GITHUB_OUTPUT

      - name: Print versions
        shell: bash
        run: |
          echo "Detected KiND versions: ${{ steps.get-k8s-versions.outputs.versions }}"

  lint-test-chart:
    runs-on: ubuntu-24.04
    needs: [get-k8s-versions]

    strategy:
      fail-fast: false

      matrix:
        k8s_version: ${{ fromJson(needs.get-k8s-versions.outputs.versions) }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0

      - name: Run chart-testing (list-changed)
        id: list-changed
        run: |
          changed=$(ct list-changed --config .ct.yaml)
          if [[ -n "$changed" ]]; then
            echo "::set-output name=changed::true"
          fi

      - name: Run chart-testing (lint)
        run: |
          ct \
            lint \
            --config .ct.yaml \
            ${{github.event_name == 'workflow_dispatch' && '--all'}} ;

      - if: steps.list-changed.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          node_image: "kindest/node:${{ matrix.k8s_version }}"
          config: .kind-config.yaml

      - name: Run chart-testing (install)
        run: |
          ct \
            install \
            --config .ct.yaml \
            --debug \
            ${{github.event_name == 'workflow_dispatch' && '--all'}} ;
